<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P5 国语 TK1-36 练习</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #059669;
  --primary-dark: #047857;
  --primary-light: #f0fdf4;
  --purple: #34d399;
  --gold: #d97706;
  --gold-light: #fef3c7;
  --red: #dc2626;
  --red-light: #fee2e2;
  --green: #16a34a;
  --green-light: #dcfce7;
  --blue: #2563eb;
  --blue-light: #dbeafe;
  --gray: #6b7280;
  --bg: #ecfdf5;
  --card: #ffffff;
  --border: #6ee7b7;
  --text: #064e3b;
  --text-light: #6b7280;
  --radius: 14px;
  --shadow: 0 2px 14px rgba(5,150,105,0.10);
  --shadow-lg: 0 8px 40px rgba(5,150,105,0.14);
  --gradient: linear-gradient(135deg, #10b981 0%, #059669 100%);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 50%, #ccfbf1 100%);
  background-attachment: fixed;
  color: var(--text);
  min-height: 100vh;
}
#app { max-width: 1100px; margin: 0 auto; padding: 16px; }

/* ---- HEADER ---- */
.app-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px; background: rgba(255,255,255,0.65); backdrop-filter: blur(16px); border: 1.5px solid rgba(255,255,255,0.85); border-radius: var(--radius); color: #064e3b; margin-bottom: 20px; box-shadow: 0 4px 24px rgba(5,150,105,0.14); }
.app-header h1 { font-size: 1.5rem; font-weight: 900; letter-spacing: -0.5px; color: #047857; text-shadow: none; }
.app-header .subtitle { font-size: 0.8rem; opacity: 0.85; margin-top: 2px; }
.btn-admin { background: rgba(255,255,255,0.65); border: 2px solid rgba(255,255,255,0.9); color: #047857; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 700; font-family: inherit; transition: all 0.2s; }
.btn-admin:hover { background: rgba(255,255,255,0.92); }

/* ---- BUTTONS ---- */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 22px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.95rem; font-weight: 700; font-family: inherit; transition: all 0.18s; }
.btn-primary { background: var(--gradient); color: #fff; box-shadow: 0 3px 12px rgba(5,150,105,0.22); }
.btn-primary:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 6px 18px rgba(5,150,105,0.32); }
.btn-gold { background: var(--gold); color: #fff; box-shadow: 0 3px 10px rgba(217,119,6,0.3); }
.btn-gold:hover:not(:disabled) { background: #b45309; transform: translateY(-1px); }
.btn-red { background: var(--red); color: #fff; }
.btn-red:hover:not(:disabled) { background: #b91c1c; }
.btn-green { background: var(--green); color: #fff; }
.btn-green:hover:not(:disabled) { background: #15803d; }
.btn-gray { background: #e5e7eb; color: var(--text); }
.btn-gray:hover:not(:disabled) { background: #d1d5db; }
.btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
.btn-sm { padding: 6px 14px; font-size: 0.82rem; }
.btn-block { width: 100%; justify-content: center; }
.btn-back { background: rgba(255,255,255,0.75); border: 2px solid rgba(255,255,255,0.9); color: #047857; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 700; font-family: inherit; transition: all 0.18s; }
.btn-back:hover { background: rgba(255,255,255,0.95); }

/* ---- LOGIN SCREEN ---- */
.login-screen { min-height: calc(100vh - 48px); display: flex; align-items: center; justify-content: center; padding: 20px 0; }
.login-card { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.25); padding: 42px 38px; width: 100%; max-width: 440px; animation: slideIn 0.5s ease; }
@keyframes slideIn { from{opacity:0;transform:translateY(-30px)} to{opacity:1;transform:translateY(0)} }
.login-logo { text-align: center; margin-bottom: 26px; }
.login-logo .icon { font-size: 3.2rem; }
.login-logo h2 { font-size: 1.7rem; font-weight: 900; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-top: 10px; }
.login-logo p { color: var(--text-light); font-size: 0.88rem; margin-top: 5px; }
.login-notice { background: #fff8e1; border: 2px solid #ffe082; border-radius: 10px; padding: 12px 16px; font-size: 0.85rem; font-weight: 700; color: #e65100; margin-bottom: 20px; }
.form-label { font-size: 0.88rem; font-weight: 800; color: var(--text-light); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.5px; }
.form-select, .form-input { width: 100%; padding: 12px 14px; border: 2px solid var(--border); border-radius: 8px; font-size: 0.95rem; font-family: inherit; font-weight: 600; color: var(--text); outline: none; transition: border-color 0.2s; background: var(--card); }
.form-select:focus, .form-input:focus { border-color: var(--primary); }
.login-divider { display: flex; align-items: center; gap: 10px; margin: 16px 0; color: var(--text-light); font-size: 0.82rem; }
.login-divider::before, .login-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.login-card .btn-primary { background: var(--gradient); }
.login-card .btn-gray { background: #f3f4f6; color: #374151; border: 2px solid var(--border); }

/* ---- MAIN GRID ---- */
.section-label { font-size: 1.1rem; font-weight: 800; color: #047857; margin: 0 0 12px; }
.student-banner { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.75); backdrop-filter: blur(8px); border: 1.5px solid rgba(255,255,255,0.9); border-radius: 12px; padding: 14px 20px; margin-bottom: 18px; }
.student-banner .name { font-size: 1rem; font-weight: 800; color: #047857; }
.student-banner .stats { font-size: 0.82rem; color: #059669; font-weight: 600; margin-top: 2px; }
.tk-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
.tk-card { background: #fff; border: 2px solid rgba(255,255,255,0.8); border-radius: var(--radius); padding: 16px 14px; cursor: pointer; transition: all 0.2s; position: relative; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
.tk-card:hover:not(.locked) { transform: translateY(-4px); box-shadow: 0 10px 30px rgba(5,150,105,0.18); border-color: var(--primary); }
.tk-card.locked { opacity: 0.6; cursor: not-allowed; background: rgba(255,255,255,0.7); }
.tk-card.complete { border-color: var(--green); background: var(--green-light); }
.tk-card.active { border-color: var(--primary); background: var(--primary-light); }
.tk-card .tk-num { font-size: 1.5rem; font-weight: 900; color: var(--primary); }
.tk-card.locked .tk-num { color: var(--gray); }
.tk-card.complete .tk-num { color: var(--green); }
.tk-card .tk-name { font-size: 0.72rem; color: var(--text-light); margin-top: 4px; line-height: 1.3; }
.tk-card .tk-status { position: absolute; top: 10px; right: 10px; font-size: 1.1rem; }
.tk-card .tk-progress { display: flex; gap: 3px; margin-top: 8px; }
.tk-card .tk-progress .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
.tk-card .tk-progress .dot.done { background: var(--green); }
.tk-card .tk-progress .dot.active-dot { background: var(--gold); }
.tk-card .tk-wait { font-size: 0.62rem; color: #d97706; font-weight: 800; margin-top: 5px; line-height: 1.3; }
.tk-card.waiting { border-color: #fbbf24; background: #fffbeb; opacity: 0.85; cursor: not-allowed; }
.tk-card.waiting .tk-num { color: #d97706; }
/* ---- PAIR UNLOCK BOX ---- */
.pair-unlock-box { border-radius: 10px; padding: 12px 16px; margin: 12px 0 4px; font-size: 0.88rem; font-weight: 700; text-align: center; }
.pair-unlock-box.unlocked { background: var(--green-light); color: var(--green); border: 1.5px solid #86efac; }
.pair-unlock-box.waiting { background: #fffbeb; color: #d97706; border: 1.5px solid #fcd34d; }
.pair-unlock-box.fail { background: var(--red-light); color: var(--red); border: 1.5px solid #fca5a5; }
/* ---- LB SELF HIGHLIGHT ---- */
.lb-item.lb-self { background: linear-gradient(135deg,#d1fae5,#a7f3d0); border: 2px solid #34d399; border-radius: 10px; }
/* ---- STATUS CARD ---- */
.status-card { background: rgba(255,255,255,0.82); backdrop-filter: blur(8px); border: 1.5px solid rgba(255,255,255,0.9); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 18px; box-shadow: 0 2px 12px rgba(5,150,105,0.10); display: flex; flex-direction: column; gap: 12px; }
.status-row { display: flex; align-items: flex-start; gap: 12px; }
.status-icon { font-size: 1.4rem; line-height: 1; margin-top: 2px; }
.status-title { font-size: 0.85rem; font-weight: 800; color: var(--text); margin-bottom: 2px; }
.status-val { font-size: 1rem; font-weight: 900; color: #d97706; }
.status-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
.status-chip { background: var(--primary-light); color: var(--primary-dark); border: 1.5px solid #6ee7b7; border-radius: 20px; padding: 3px 10px; font-size: 0.78rem; font-weight: 700; }
.status-divider { height: 1px; background: var(--border); opacity: 0.5; }

/* ---- TK DETAIL ---- */
.tk-detail-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
.tk-title { font-size: 1.3rem; font-weight: 900; color: #064e3b; text-shadow: none; }
.section-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.tab { padding: 10px 24px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.7); background: rgba(255,255,255,0.55); backdrop-filter: blur(6px); cursor: pointer; font-size: 0.9rem; font-weight: 700; font-family: inherit; transition: all 0.18s; display: flex; align-items: center; gap: 6px; color: #047857; }
.tab:hover:not(:disabled):not(.locked-tab) { background: rgba(255,255,255,0.80); }
.tab.active { background: #fff; color: var(--primary); border-color: #fff; box-shadow: 0 4px 14px rgba(0,0,0,0.12); }
.tab.done { border-color: rgba(255,255,255,0.8); color: #047857; }
.tab.done.active { background: var(--green); color: #fff; border-color: var(--green); }
.tab:disabled, .tab.locked-tab { opacity: 0.4; cursor: not-allowed; }
.section-content { background: var(--card); border-radius: var(--radius); padding: 24px; box-shadow: 0 4px 24px rgba(0,0,0,0.12); }

/* ---- TIMER ---- */
.timer-wrap { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding: 12px 18px; border-radius: 10px; background: #ecfdf5; border: 1px solid #99f6e4; }
.timer-display { font-size: 1.5rem; font-weight: 900; color: var(--primary); font-variant-numeric: tabular-nums; }
.timer-display.urgent { color: var(--red); animation: pulse 1s infinite; }
.timer-label { font-size: 0.82rem; color: var(--text-light); font-weight: 600; }
.timer-bar-wrap { height: 6px; background: #e5e7eb; border-radius: 3px; margin-top: 8px; overflow: hidden; }
.timer-bar-fill { height: 100%; background: var(--gradient); border-radius: 3px; transition: width 1s linear; }
.timer-bar-fill.urgent { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

/* ---- VOCAB CARDS ---- */
.vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; margin-bottom: 24px; }
.vocab-card { height: 160px; perspective: 800px; cursor: pointer; }
.vocab-card-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.45s cubic-bezier(0.4,0,0.2,1); border-radius: var(--radius); }
.vocab-card.flipped .vocab-card-inner { transform: rotateY(180deg); }
.vocab-front, .vocab-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: var(--radius); border: 2px solid var(--border); padding: 14px; display: flex; flex-direction: column; }
.vocab-front { background: var(--gradient); color: #fff; align-items: center; justify-content: center; text-align: center; border: none; box-shadow: 0 4px 16px rgba(5,150,105,0.18); }
.vocab-back { background: var(--card); transform: rotateY(180deg); justify-content: space-between; font-size: 0.82rem; }
.vocab-front .word { font-size: 1.15rem; font-weight: 900; }
.vocab-front .hint { font-size: 0.72rem; opacity: 0.85; margin-top: 6px; }
.vocab-back .cn { font-size: 0.95rem; font-weight: 700; color: var(--primary); margin-bottom: 6px; }
.vocab-back .bm { color: var(--text); line-height: 1.4; }
.vocab-back .meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.vocab-back .tag { padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; }
.tag-root { background: #dbeafe; color: var(--blue); }
.tag-imb { background: var(--gold-light); color: var(--gold); }
.vocab-counter { text-align: center; color: var(--text-light); font-size: 0.85rem; margin-bottom: 8px; }
.flip-reminder { text-align:center; font-size:0.88rem; color:#d97706; margin-bottom:14px; font-weight:600; }
.a-actions { display: flex; justify-content: center; gap: 12px; }

/* ---- FILL BLANKS ---- */
.word-bank { margin-bottom: 20px; padding: 14px 18px; background: var(--gold-light); border: 2px solid #fcd34d; border-radius: 10px; }
.word-bank-title { font-size: 0.8rem; font-weight: 800; color: var(--gold); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
.word-bank-items { display: flex; flex-wrap: wrap; gap: 8px; }
.wb-item { padding: 5px 12px; background: #fff; border: 2px solid #fcd34d; border-radius: 20px; font-size: 0.88rem; font-weight: 700; color: #92400e; cursor: pointer; transition: all 0.15s; }
.wb-item:hover { background: var(--gold); color: #fff; border-color: var(--gold); }
.wb-item.used { opacity: 0.4; text-decoration: line-through; }
.passage-wrap { line-height: 2.2; font-size: 0.95rem; margin-bottom: 20px; }
.passage-para { margin-bottom: 14px; }
.passage-title { font-weight: 900; font-size: 1.05rem; color: var(--primary); margin-bottom: 16px; }
.blank-input { display: inline-block; border: none; border-bottom: 2px solid var(--primary); background: transparent; width: 110px; padding: 2px 6px; font-size: 0.95rem; font-family: inherit; font-weight: 700; text-align: center; color: var(--text); outline: none; transition: border-color 0.2s; vertical-align: bottom; }
.blank-input:focus { border-bottom-color: var(--gold); }
.blank-input.correct { border-bottom-color: var(--green); background: var(--green-light); color: var(--green); }
.blank-input.wrong { border-bottom-color: var(--red); background: var(--red-light); color: var(--red); }
.blank-input.corrected { border-bottom-color: var(--blue); background: var(--blue-light); color: var(--blue); }
.blank-num { font-size: 0.7rem; font-weight: 800; color: var(--text-light); vertical-align: super; margin-right: 1px; }
.score-box { padding: 16px 20px; border-radius: 10px; margin-bottom: 18px; display: flex; align-items: center; gap: 16px; }
.score-box.pass { background: var(--green-light); border: 2px solid #86efac; }
.score-box.fail { background: var(--red-light); border: 2px solid #fca5a5; }
.score-num { font-size: 2.5rem; font-weight: 900; }
.score-num.pass { color: var(--green); }
.score-num.fail { color: var(--red); }
.score-msg { font-size: 0.9rem; font-weight: 700; }
.correction-notice { background: var(--gold-light); border: 2px solid #fcd34d; border-radius: 10px; padding: 14px 18px; margin-bottom: 18px; font-size: 0.88rem; color: #92400e; font-weight: 600; }
.bc-actions { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.attempt-info { font-size: 0.82rem; color: var(--text-light); font-weight: 600; }
.no-wordbank-notice { padding: 10px 16px; background: #ede9fe; border: 2px solid #c4b5fd; border-radius: 8px; font-size: 0.85rem; color: #5b21b6; font-weight: 700; margin-bottom: 16px; }
.c-instructions { padding: 10px 16px; background: #ecfdf5; border: 2px solid #6ee7b7; border-radius: 8px; font-size: 0.85rem; color: #047857; font-weight: 700; margin-bottom: 16px; }
.ejaan-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 10px; margin-bottom: 20px; }
.ejaan-item { display: flex; align-items: center; gap: 10px; background: #f9fafb; border: 1.5px solid #a7f3d0; border-radius: 10px; padding: 10px 14px; }
.ejaan-num { font-weight: 900; color: var(--primary); min-width: 26px; font-size: 0.9rem; }
.ejaan-hint { flex: 1; }
.ejaan-cn { display: block; font-size: 0.88rem; font-weight: 700; color: var(--text); }
.ejaan-bm { display: block; font-size: 0.78rem; color: var(--text-light); margin-top: 2px; font-style: italic; }
.ejaan-input-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.ejaan-input { width: 160px; padding: 6px 10px; border: 2px solid var(--border); border-radius: 7px; font-size: 0.9rem; font-family: inherit; font-weight: 700; text-align: center; outline: none; transition: border-color 0.2s; }
.ejaan-input:focus { border-color: var(--primary); }
.ejaan-input.correct { border-color: var(--green); background: var(--green-light); color: var(--green); }
.ejaan-input.wrong { border-color: var(--red); background: var(--red-light); color: var(--red); }
.ejaan-answer { font-size: 0.75rem; color: var(--red); font-weight: 700; }

/* ---- DICTATION ---- */
.hint-box { background: #ecfdf5; border: 2px solid #c7d2fe; border-radius: 10px; padding: 16px 20px; margin-bottom: 20px; }
.hint-title { font-size: 0.78rem; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
.hint-text { line-height: 1.8; font-size: 0.92rem; color: var(--text); }
.dictation-area { width: 100%; min-height: 140px; padding: 14px 16px; border: 2px solid var(--border); border-radius: 10px; font-size: 0.95rem; font-family: inherit; font-weight: 600; line-height: 1.7; resize: vertical; outline: none; transition: border-color 0.2s; }
.dictation-area:focus { border-color: var(--primary); }
.lcs-result { margin: 16px 0; padding: 14px 18px; border-radius: 10px; }
.lcs-result.pass { background: var(--green-light); border: 2px solid #86efac; }
.lcs-result.fail { background: var(--red-light); border: 2px solid #fca5a5; }
.lcs-words { font-size: 0.85rem; margin-top: 8px; line-height: 1.8; }
.lcs-words .matched { color: var(--green); font-weight: 700; }
.lcs-words .missed { color: var(--red); text-decoration: line-through; opacity: 0.7; }
.d-label { font-size: 0.85rem; font-weight: 700; color: var(--text-light); margin-bottom: 8px; }
.d-instructions { font-size: 0.85rem; color: var(--text-light); margin-bottom: 16px; line-height: 1.5; padding: 12px 16px; background: #ecfdf5; border-radius: 8px; border-left: 3px solid var(--primary); }

/* ---- ADMIN ---- */
.admin-wrap { max-width: 780px; margin: 0 auto; }
.admin-card { background: var(--card); border-radius: var(--radius); padding: 24px; box-shadow: 0 4px 24px rgba(0,0,0,0.12); margin-bottom: 16px; }
.admin-title { font-size: 1.1rem; font-weight: 800; color: var(--primary); margin-bottom: 16px; }
.admin-btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.admin-input { width: 100%; padding: 10px 14px; border: 2px solid var(--border); border-radius: 8px; font-size: 1rem; font-family: inherit; outline: none; transition: border-color 0.2s; }
.admin-input:focus { border-color: var(--primary); }
.admin-err { color: var(--red); font-size: 0.85rem; margin-top: 8px; font-weight: 600; }
.progress-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
.progress-table th { text-align: left; padding: 8px 12px; background: #ecfdf5; font-weight: 700; border-bottom: 2px solid var(--border); color: var(--primary); }
.progress-table td { padding: 8px 12px; border-bottom: 1px solid #f3f4f6; vertical-align: middle; }
.progress-table tr:hover td { background: #ecfdf5; }
.status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 4px; }
.dot-done { background: var(--green); }
.dot-none { background: var(--border); }

/* ---- MODALS ---- */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(6,78,59,0.4); z-index: 1000; align-items: center; justify-content: center; padding: 16px; backdrop-filter: blur(3px); }
.modal-overlay.open { display: flex; }
.modal-box { background: var(--card); border-radius: 18px; padding: 28px; max-width: 500px; width: 100%; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(5,150,105,0.18); animation: modalIn 0.25s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes modalIn { from{transform:scale(0.85);opacity:0} to{transform:scale(1);opacity:1} }
.modal-title { font-size: 1.2rem; font-weight: 900; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 18px; }
.modal-footer { display: flex; gap: 10px; margin-top: 18px; justify-content: flex-end; }
.student-list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: #ecfdf5; border: 1px solid #e8e8f8; border-radius: 8px; margin-bottom: 8px; }
.student-list-item .sname { font-weight: 700; color: var(--primary); }
.student-list-item .sinfo { font-size: 0.8rem; color: var(--text-light); margin-top: 2px; }

/* ---- LEADERBOARD ---- */

<script>
'use strict';

// ═══════════════════════════════
//  CONFIG
// ═══════════════════════════════
const TEACHER_PASS = 'admin123';
const STORAGE_KEY = 'students_tk_complete';
const SUPER_TEACHER = 'PEGGY';  // superteacher login name
const SECTION_TIMES = { A: 15*60, B: 15*60, C: 12*60, D: 0 };
const PASS_THRESHOLD = { B: 85, C: 85, D: 80 };
const B_MAX_ATTEMPTS = 3;
const SCORE_MULT = [100, 90, 80, 70, 70]; // attempt 1,2,3,4,5

// ═══════════════════════════════
//  DATA
// ═══════════════════════════════
let TK = {};
function initData() {
  if (window.tkData1_18)  Object.assign(TK, window.tkData1_18);
  if (window.tkData19_36) Object.assign(TK, window.tkData19_36);
  const numbered = {};
  Object.keys(TK).forEach(k => { numbered[+k] = TK[k]; });
  TK = numbered;
}

// ═══════════════════════════════
//  STUDENT STORAGE (localStorage cache + Firebase sync)
// ═══════════════════════════════
function getAllStudents() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch { return {}; }
}
function saveAllStudents(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}
function getStudentData(name) {
  const all = getAllStudents();
  return all[name] || null;
}
function saveStudentData(name, data) {
  const all = getAllStudents();
  all[name] = data;
  saveAllStudents(all);
  // Sync to Firebase (fire-and-forget, don't break if offline)
  try {
    const safe = JSON.parse(JSON.stringify(data)); // strip undefined
    db.ref('students/' + encodeFireKey(name)).set(safe).catch(() => {});
  } catch(e) {}
}
function encodeFireKey(name) {
  // Firebase keys cannot contain . # $ [ ]
  return name.replace(/[.#$[\]]/g, '_');
}
// Pull one student's latest data from Firebase into localStorage
function syncStudentFromFirebase(name, onDone) {
  try {
    db.ref('students/' + encodeFireKey(name)).once('value').then(snap => {
      const remote = snap.val();
      if (remote) {
        const all = getAllStudents();
        all[name] = remote;
        saveAllStudents(all);
      }
      onDone();
    }).catch(() => onDone());
  } catch(e) { onDone(); }
}
function getStudentNames() {
  return Object.keys(getAllStudents());
}
// Progress is stored inside student.progress[tkNum]
function getProgress(studentName) {
  const sd = getStudentData(studentName);
  return sd ? (sd.progress || {}) : {};
}
function getP(n) {
  if (!currentStudent) return {};
  return getProgress(currentStudent)[n] || {};
}
function setP(n, updates) {
  if (!currentStudent) return;
  const sd = getStudentData(currentStudent) || newStudentObj();
  if (!sd.progress) sd.progress = {};
  sd.progress[n] = { ...(sd.progress[n] || {}), ...updates };
  saveStudentData(currentStudent, sd);
}
function newStudentObj() {
  return { totalScore: 0, totalTime: 0, completedTK: {}, progress: {}, lastAccess: new Date().toISOString() };
}

// ═══════════════════════════════
//  STATE
// ═══════════════════════════════
let currentStudent = null;

const S = {
  screen: 'login',    // 'login' | 'main' | 'tk' | 'admin'
  currentTk: 1,
  currentSection: 'A',
  // Timers
  timerLeft: 0,
  timerTotal: 0,
  timerRunning: false,
  // B Section
  bAttempts: 0,
  bResults: null,
  bPassed: false,
  bNeedsCorrect: false,
  bScore: 0,
  // C Section
  cAttempts: 0,
  cResults: null,
  cPassed: false,
  cNeedsCorrect: false,
  cScore: 0,
  cShuffledVocab: null,
  // D Section
  dResult: null,
  dParaIdx: 0,      // current paragraph index (for display)
  dParaQueue: [],   // remaining paragraph indices (shuffled, no repeat)
};
let timerInt = null;

// ═══════════════════════════════
//  UTILITIES
// ═══════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function formatTime(s) {
  const m = Math.floor(s / 60).toString().padStart(2, '0');
  return `${m}:${(s % 60).toString().padStart(2, '0')}`;
}
function isSuperTeacher() { return currentStudent === SUPER_TEACHER; }

// ═══════════════════════════════
//  PAIR UNLOCK HELPERS
// ═══════════════════════════════
// Get average score (B+C+D)/3 for a completed TK
function getTKAvg(n, sd) {
  const tk = (sd.completedTK || {})[n];
  if (!tk || !tk.details) return 0;
  const b = tk.details.B?.score || 0;
  const c = tk.details.C?.score || 0;
  const d = tk.details.D?.score || 0;
  return Math.round((b + c + d) / 3);
}
// True if TK is completed AND avg(B,C,D) >= 85%
function getTKPassed(n, sd) {
  const tk = (sd && sd.completedTK || {})[n];
  return !!(tk && tk.passedAt); // permanent flag — set once when avg*mult >= 85%, never removed
}
// Get the date when next pair unlocks (7 days after even TK completion)
function getPairUnlockDate(evenTK, sd) {
  const tk = (sd.completedTK || {})[evenTK];
  if (!tk) return null;
  const dateStr = tk.passedAt || tk.date; // passedAt = first time passed (redo won't reset timer)
  if (!dateStr) return null;
  const d = new Date(dateStr);
  d.setDate(d.getDate() + 7);
  return d;
}
// Get remaining ms for 7-day wait on an odd TK >= 3 (null = not applicable)
function getPairWaitMs(n, sd) {
  if (n % 2 === 0 || n < 3) return null;
  if (!getTKPassed(n - 2, sd) || !getTKPassed(n - 1, sd)) return null;
  const unlockDate = getPairUnlockDate(n - 1, sd);
  if (!unlockDate) return null;
  const remaining = unlockDate - new Date();
  return remaining > 0 ? remaining : null;
}
// Format ms into human-readable countdown
function formatCountdown(ms) {
  const totalSec = Math.floor(ms / 1000);
  const days = Math.floor(totalSec / 86400);
  const hours = Math.floor((totalSec % 86400) / 3600);
  const mins = Math.floor((totalSec % 3600) / 60);
  if (days > 0) return `${days}天${hours}小时后解锁`;
  if (hours > 0) return `${hours}小时${mins}分后解锁`;
  return `${mins > 0 ? mins : 1}分钟后解锁`;
}

// Split rencana.bm into paragraphs for D section dictation
function getDParas(n) {
  const r = TK[n].rencana;
  if (!r || !r.bm) return [];
  // Split by \n, skip empty lines
  const lines = r.bm.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  return lines;
}

// Get specific paragraph for D section (random, no repeat)
function getDParaText(n) {
  const paras = getDParas(n);
  const idx = S.dParaIdx;
  return paras[idx] || paras[0];
}

// Initialise random paragraph queue for this session
function initDPara(n) {
  if (isSuperTeacher()) { S.dParaIdx = 0; S.dParaQueue = []; return; }
  const pn = getP(n);
  // Load saved queue, or build a new shuffled one
  let queue = pn.dParaQueue || [];
  if (!queue.length) {
    const paras = getDParas(n);
    queue = shuffle(paras.map((_, i) => i)); // new shuffled queue
  }
  S.dParaQueue = [...queue];
  S.dParaIdx = queue[0]; // peek at next paragraph
}

function isUnlocked(n) {
  if (isSuperTeacher()) return true;
  if (n === 1) return true;
  const sd = getStudentData(currentStudent);
  if (!sd) return false;
  if (n % 2 === 0) {
    // Even TK: unlocked immediately when previous (odd) TK in same pair is passed (avg >= 85%)
    return getTKPassed(n - 1, sd);
  } else {
    // Odd TK (n >= 3): previous pair (n-2 and n-1) must both be passed AND 7 days elapsed
    if (!getTKPassed(n - 2, sd) || !getTKPassed(n - 1, sd)) return false;
    const unlockDate = getPairUnlockDate(n - 1, sd);
    if (!unlockDate) return false;
    return new Date() >= unlockDate;
  }
}
function isSectionUnlocked(n, sec) {
  if (isSuperTeacher()) return true;
  const p = getP(n);
  if (!isUnlocked(n)) return false;
  if (sec === 'A') return true;
  if (sec === 'B') return !!p.aComplete;
  if (sec === 'C') return !!p.bComplete;
  if (sec === 'D') return !!p.cComplete;
  return false;
}
function getFirstUnlockedSection(n) {
  for (const s of ['D','C','B','A']) {
    if (isSectionUnlocked(n, s)) return s;
  }
  return 'A';
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Custom confirm (replaces browser confirm() which can be blocked)
function customConfirm(msg, onOk, icon) {
  document.getElementById('confirm-msg').textContent = msg;
  document.getElementById('confirm-icon').textContent = icon || '⚠️';
  openModal('modal-confirm');
  const okBtn = document.getElementById('confirm-ok-btn');
  const cancelBtn = document.getElementById('confirm-cancel-btn');
  const cleanup = () => { closeModal('modal-confirm'); okBtn.onclick = null; cancelBtn.onclick = null; };
  okBtn.onclick = () => { cleanup(); onOk(); };
  cancelBtn.onclick = () => cleanup();
}

// ═══════════════════════════════
//  TIMER
// ═══════════════════════════════
function startTimer(seconds, onTick, onEnd) {
  stopTimer();
  S.timerLeft = seconds;
  S.timerTotal = seconds;
  S.timerRunning = true;
  onTick(seconds);
  timerInt = setInterval(() => {
    S.timerLeft--;
    onTick(S.timerLeft);
    if (S.timerLeft <= 0) { stopTimer(); onEnd(); }
  }, 1000);
}
function stopTimer() {
  clearInterval(timerInt);
  timerInt = null;
  S.timerRunning = false;
}
function updateTimerUI() {
  const disp = document.querySelector('.timer-display');
  const bar  = document.querySelector('.timer-bar-fill');
  if (!disp || !S.timerRunning) return;
  const pct = S.timerTotal > 0 ? (S.timerLeft / S.timerTotal * 100) : 0;
  disp.textContent = formatTime(S.timerLeft);
  disp.className = 'timer-display' + (S.timerLeft <= 60 ? ' urgent' : '');
  if (bar) {
    bar.style.width = pct + '%';
    bar.className = 'timer-bar-fill' + (S.timerLeft <= 60 ? ' urgent' : '');
  }
}

// ═══════════════════════════════
//  LCS ALGORITHM
// ═══════════════════════════════
function normalizeWords(text) {
  return text.toLowerCase().replace(/[.,!?;:'"\-()]/g,' ').split(/\s+/).filter(w => w.length > 0);
}
function getLCSWords(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, () => new Array(n+1).fill(0));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1]+1 : Math.max(dp[i-1][j], dp[i][j-1]);
  const matched = new Set();
  let i = m, j = n;
  while (i > 0 && j > 0) {
    if (a[i-1] === b[j-1]) { matched.add(j-1); i--; j--; }
    else if (dp[i-1][j] >= dp[i][j-1]) i--;
    else j--;
  }
  return matched;
}
function scoreDictation(input, reference) {
  const inputW = normalizeWords(input);
  const refW   = normalizeWords(reference);
  if (refW.length === 0) return { score: 0, inputW, refW, matchedSet: new Set() };
  const matchedSet = getLCSWords(inputW, refW);
  const score = Math.round(matchedSet.size / refW.length * 100);
  return { score, inputW, refW, matchedSet };
}

// ═══════════════════════════════
//  PARSE PASSAGE
// ═══════════════════════════════
function parsePassage(text) {
  let blankIdx = 0;
  return text.split('\n').map(para => {
    if (!para.trim()) return null;
    const parts = para.split('__');
    const tokens = [];
    parts.forEach((seg, i) => {
      if (seg) tokens.push({ type: 'text', content: seg });
      if (i < parts.length - 1) tokens.push({ type: 'blank', index: blankIdx++ });
    });
    return tokens;
  }).filter(Boolean);
}

// ═══════════════════════════════
//  RENDER
// ═══════════════════════════════
function renderApp() {
  const app = document.getElementById('app');
  if (S.screen === 'login') app.innerHTML = buildLogin();
  else if (S.screen === 'main') app.innerHTML = buildMain();
  else if (S.screen === 'tk')   app.innerHTML = buildTK();
  else if (S.screen === 'admin') app.innerHTML = buildAdmin();
  attachEvents();
}

// ═══════════════════════════════
//  LOGIN SCREEN
// ═══════════════════════════════
function buildLogin() {
  const names = getStudentNames();
  return `
    <div class="login-screen">
      <div class="login-card">
        <div class="login-logo">
          <div class="icon">🌿</div>
          <h2>P5 国语 TK1-36 练习</h2>

        </div>
        <div class="login-notice">⚠️ 只有老师添加的学生才能登录学习</div>
        <label class="form-label">输入你的名字</label>
        <input type="text" class="form-input" id="student-name-input" placeholder="请输入你的英文名字" autocomplete="off" spellcheck="false" style="text-transform:uppercase;">
        <div id="name-error" style="color:#dc2626;font-size:0.85rem;margin-top:6px;font-weight:700;display:none;"></div>
        <button class="btn btn-primary btn-block" style="margin-top:14px;" id="btn-start-learning">📚 开始学习</button>
        <div class="login-divider">或</div>
        <button class="btn btn-gray btn-block" id="btn-show-teacher">🔐 超级老师验证</button>
      </div>
    </div>`;
}

function startLearning() {
  const inp = document.getElementById('student-name-input');
  const err = document.getElementById('name-error');
  if (!inp) return;
  const name = inp.value.trim().toUpperCase();
  if (!name) {
    err.textContent = '请输入你的名字！';
    err.style.display = 'block';
    return;
  }
  const all = getAllStudents();
  if (!all[name] && name !== SUPER_TEACHER) {
    err.textContent = '❌ 名字不在系统内，请联系老师添加。';
    err.style.display = 'block';
    return;
  }
  err.style.display = 'none';
  if (name === SUPER_TEACHER) {
    document.getElementById('teacher-pass-input').value = '';
    document.getElementById('teacher-pass-err').style.display = 'none';
    S._pendingSuperTeacher = name;
    openModal('modal-teacher-login');
    return;
  }
  // Show loading state while syncing from Firebase
  const btnStart = document.getElementById('btn-start-learning');
  if (btnStart) { btnStart.disabled = true; btnStart.textContent = '⏳ 同步中...'; }
  syncStudentFromFirebase(name, () => {
    currentStudent = name;
    const sd = getStudentData(currentStudent) || newStudentObj();
    sd.lastAccess = new Date().toISOString();
    saveStudentData(currentStudent, sd);
    S.screen = 'main';
    renderApp();
  });
}

// ═══════════════════════════════
//  MAIN SCREEN
// ═══════════════════════════════
function buildMain() {
  const sd = getStudentData(currentStudent) || newStudentObj();
  const completedCount = Object.keys(sd.completedTK || {}).length;
  const totalTK = Object.keys(TK).length;
  let cards = '';
  for (let n = 1; n <= 36; n++) {
    const tkData = TK[n];
    if (!tkData) continue;
    const pn = getP(n);
    const locked = !isUnlocked(n);
    const redoing = !!pn.redoing;
    const complete = !!(sd.completedTK || {})[n] && !redoing;
    // Check if this TK is in 7-day waiting state (visual only — PEGGY can still click)
    const waitMs = locked ? getPairWaitMs(n, sd) : null;
    const isWaiting = waitMs !== null;
    const cls = isWaiting ? 'locked waiting' : locked ? 'locked' : complete ? 'complete' : 'active';
    const icon = isWaiting ? '⏰' : locked ? '🔒' : complete ? '✅' : '📖';
    const title = tkData.title.replace(/^TK \d+\s*-?\s*/, '');
    const dots = ['A','B','C','D'].map(s => {
      const done = pn[s.toLowerCase()+'Complete'] || (s==='D' && complete);
      const isActive = !locked && !done && isSectionUnlocked(n, s);
      return `<div class="dot${done?' done':isActive?' active-dot':''}"></div>`;
    }).join('');
    cards += `
      <div class="tk-card ${cls}" data-open-tk="${n}">
        <div class="tk-status">${icon}</div>
        <div class="tk-num">TK ${n}</div>
        <div class="tk-name">${escHtml(title)}</div>
        ${isWaiting ? `<div class="tk-wait">${formatCountdown(waitMs)}</div>` : ''}
        <div class="tk-progress">${dots}</div>
      </div>`;
  }
  return `
    <div class="app-header">
      <div>
        <h1>📚 P5 国语 TK1-36 练习</h1>
        <div class="subtitle">P5国语 TK1-36练习</div>
      </div>
      <button class="btn-back" id="btn-logout">退出</button>
    </div>
    <div class="student-banner" style="${isSuperTeacher() ? 'background:linear-gradient(135deg,#fef3c7,#fde68a);border-color:#f59e0b;' : ''}">
      <div>
        <div class="name">${isSuperTeacher() ? '👩‍🏫 超级老师模式 — PEGGY' : '👋 你好，' + escHtml(currentStudent) + '！'}</div>
        <div class="stats">${isSuperTeacher() ? '✅ 所有 TK 已解锁 · 无需计分 · 自由浏览' : '已完成 ' + completedCount + ' / ' + totalTK + ' 个 TK · 总分 ' + (sd.totalScore || 0) + ' 分'}</div>
      </div>
      ${!isSuperTeacher() ? `<button class="btn btn-gold btn-sm" id="btn-student-lb">🏆 排行榜</button>` : ''}
    </div>
    ${!isSuperTeacher() ? buildStatusCard(sd) : ''}
    <div class="section-label">选择练习单元</div>
    <div class="tk-grid">${cards}</div>`;
}

// ═══════════════════════════════
//  TK SCREEN
// ═══════════════════════════════
function buildTK() {
  const n = S.currentTk;
  const tkData = TK[n];
  if (!tkData) return '<div class="empty-state">数据加载中...</div>';
  const pn = getP(n);
  const sd = getStudentData(currentStudent) || newStudentObj();
  const title = tkData.title.replace(/^TK \d+\s*-?\s*/, '');
  const tabsHtml = ['A','B','C','D'].map(s => {
    const label = {A:'A 词汇', B:'B 填空', C:'C 听写', D:'D 默写'}[s];
    const unlocked = isSectionUnlocked(n, s);
    const done = s === 'D' ? !!(sd.completedTK||{})[n] : !!pn[s.toLowerCase()+'Complete'];
    const active = S.currentSection === s;
    const cls = ['tab', active?'active':'', done&&!active?'done':'', !unlocked?'locked-tab':''].filter(Boolean).join(' ');
    const lockIcon = !unlocked ? ' 🔒' : done ? ' ✓' : '';
    return `<button class="${cls}" ${unlocked?`data-section="${s}"`:'disabled'}>${label}${lockIcon}</button>`;
  }).join('');
  let content = '';
  if (S.currentSection === 'A') content = buildSectionA(n, tkData, pn, sd);
  if (S.currentSection === 'B') content = buildSectionB(n, tkData, pn, sd);
  if (S.currentSection === 'C') content = buildSectionC(n, tkData, pn, sd);
  if (S.currentSection === 'D') content = buildSectionD(n, tkData, pn, sd);
  return `
    <div class="app-header">
      <div>
        <h1>📚 P5 国语 TK1-36 练习</h1>
        <div class="subtitle">P5国语 TK1-36练习</div>
      </div>
      <button class="btn-back" data-nav="main">← 返回</button>
    </div>
    <div class="tk-detail-header">
      <div><div class="tk-title">TK ${n} — ${escHtml(title)}</div></div>
    </div>
    <div class="section-tabs">${tabsHtml}</div>
    <div class="section-content">${content}</div>`;
}

// ═══════════════════════════════
//  SECTION A
// ═══════════════════════════════
function buildSectionA(n, tkData, pn) {
  const done = !!pn.aComplete;
  const vocab = tkData.vocabList || [];
  let cards = '';
  vocab.forEach((v, i) => {
    cards += `
      <div class="vocab-card" data-flip="${i}">
        <div class="vocab-card-inner">
          <div class="vocab-front">
            <div class="word">${escHtml(v.word)}</div>
            <div class="hint">点击翻转看意思</div>
          </div>
          <div class="vocab-back">
            <div class="cn">${escHtml(v.maksudCN)}</div>
            <div class="bm">${escHtml(v.maksudBM)}</div>
            <div class="meta">
              <span class="tag tag-root">词根: ${escHtml(v.kataDasar)}</span>
              ${v.imbuhan !== '-' ? `<span class="tag tag-imb">词缀: ${escHtml(v.imbuhan)}</span>` : ''}
            </div>
          </div>

  });

    ${done ? '' : buildTimerHtml(SECTION_TIMES.A)}

    <p class="flip-reminder" id="flip-reminder">📖 请翻转所有 <b>${vocab.length}</b> 张卡片后才能继续 &nbsp;<span id="flip-count">0/${vocab.length}</span></p>
    <div class="vocab-grid">${cards}</div>
    <div class="a-actions">
      ${done
        ? `<span style="color:var(--green);font-weight:700;">✓ 已完成 A 部分，进入 B 部分练习吧！</span>`
        : `<button class="btn btn-primary" id="btn-complete-a" disabled style="opacity:0.4;cursor:not-allowed;">🔒 请先翻转所有卡片</button>`}
    </div>`;
}

// ═══════════════════════════════
//  SECTION B
// ═══════════════════════════════
function buildSectionB(n, tkData, pn) {
  const done = !!pn.bComplete;
  if (done) {
    const storedScore = pn.bScore || S.bScore || 0;
    return `
      <div class="completion-card success-anim">
        <div class="completion-icon">✅</div>
        <div class="completion-title">B 部分完成！</div>
        <div class="completion-score">${storedScore}<span class="completion-unit">分</span></div>
        <div class="completion-msg">填空练习通过，做得很好！</div>
        <button class="btn btn-primary" style="margin-top:16px;" id="btn-proceed-c">继续 → C 部分听写</button>
      </div>`;
  }
  const fb = tkData.fillBlanks;
  const answers = fb.answers;
  const paras = parsePassage(fb.text);
  const wb = shuffle([...answers]);
  let resultHtml = '';
  if (S.bResults) {
    const correct = S.bResults.filter(r => r.correct).length;
    const score = S.bScore;
    const passed = score >= PASS_THRESHOLD.B;
    resultHtml = `
      <div class="score-box ${passed?'pass':'fail'} success-anim">
        <div class="score-num ${passed?'pass':'fail'}">${score}分</div>
        <div>
          <div class="score-msg">${passed?'✅ 通过！':'❌ 未达到85分'} (${correct}/${answers.length} 正确)</div>
          <div style="font-size:0.82rem;margin-top:4px;color:var(--text-light)">第 ${S.bAttempts} 次提交</div>
        </div>
      </div>`;
    if (S.bNeedsCorrect) resultHtml += `<div class="correction-notice">📝 请将红色错误答案改正（填写正确答案），然后点击「确认改正」继续。</div>`;
  }
  const wbHtml = `
    <div class="word-bank">
      <div class="word-bank-title">📋 词库 (参考答案)</div>
      <div class="word-bank-items">${wb.map((w,i)=>`<span class="wb-item" data-wb="${i}">${escHtml(w)}</span>`).join('')}</div>
    </div>`;
  const passageHtml = buildPassageInputs(paras, S.bResults, answers);
  let actionsHtml = '';
  if (S.bNeedsCorrect) {
    actionsHtml = `<div class="bc-actions"><button class="btn btn-primary" id="btn-confirm-b">✓ 确认改正，进入 C 听写</button></div>`;
  } else {
    actionsHtml = `
      <div class="bc-actions">
        <button class="btn btn-primary" id="btn-submit-b">📤 提交答案</button>
        <span class="attempt-info">剩余机会: ${B_MAX_ATTEMPTS - S.bAttempts} 次</span>
      </div>`;
  }
  return `${(S.bPassed)?'':buildTimerHtml(SECTION_TIMES.B)}${resultHtml}${wbHtml}${passageHtml}${actionsHtml}`;
}

// ═══════════════════════════════
//  SECTION C
// ═══════════════════════════════
function buildSectionC(n, tkData, pn) {
  const done = !!pn.cComplete;
  if (done) {
    const storedScore = pn.cScore || S.cScore || 0;
    return `
      <div class="completion-card success-anim">
        <div class="completion-icon">✅</div>
        <div class="completion-title">C 部分完成！</div>
        <div class="completion-score">${storedScore}<span class="completion-unit">分</span></div>
        <div class="completion-msg">听写练习通过，非常棒！</div>
        <button class="btn btn-primary" style="margin-top:16px;" id="btn-proceed-d">继续 → D 部分默写</button>
      </div>`;
  }

  const vocab = tkData.vocabList || [];
  // Use shuffled order stored in state, or generate new shuffle
  if (!S.cShuffledVocab || S.cShuffledVocab.length !== vocab.length) {
    S.cShuffledVocab = shuffle(vocab.map((v, i) => ({ ...v, origIdx: i })));
  }
  const items = S.cShuffledVocab;

  let resultHtml = '';
  if (S.cResults) {
    const correct = S.cResults.filter(r => r.correct).length;
    const score = S.cScore;
    const passed = score >= PASS_THRESHOLD.C;
    resultHtml = `
      <div class="score-box ${passed?'pass':'fail'} success-anim">
        <div class="score-num ${passed?'pass':'fail'}">${score}分</div>
        <div>
          <div class="score-msg">${passed?'✅ 通过！':'❌ 未达到85分'} (${correct}/${items.length} 正确)</div>
          <div style="font-size:0.82rem;margin-top:4px;color:var(--text-light)">第 ${S.cAttempts} 次提交</div>
        </div>
      </div>`;
    if (S.cNeedsCorrect) resultHtml += `<div class="correction-notice">📝 请将红色错误答案改正（照着正确答案填写），然后点击「确认改正」继续。</div>`;
  }

  // Build vocab spelling grid
  let gridHtml = '<div class="ejaan-grid">';
  items.forEach((v, i) => {
    let inputCls = 'ejaan-input';
    let inputVal = '';
    let readonly = '';
    let hint = '';
    if (S.cResults && S.cResults[i]) {
      const r = S.cResults[i];
      inputVal = r.correct ? r.input : (r.needCorrect ? '' : r.input);
      inputCls += r.correct ? ' correct' : (r.needCorrect ? ' wrong' : ' wrong');
      readonly = r.correct ? 'readonly' : '';
      if (!r.correct && S.cNeedsCorrect) {
        hint = `<span class="ejaan-answer">✗ 答案: ${escHtml(r.answer)}</span>`;
      }
    }
    gridHtml += `
      <div class="ejaan-item">
        <span class="ejaan-num">${i+1}.</span>
        <div class="ejaan-hint">
          <span class="ejaan-cn">${escHtml(v.maksudCN)}</span>
          <span class="ejaan-bm">${escHtml(v.maksudBM)}</span>
        </div>
        <div class="ejaan-input-wrap">
          <input class="${inputCls}" data-cidx="${i}" data-answer="${escAttr(v.word)}" value="${escAttr(inputVal)}" ${readonly} autocomplete="off" spellcheck="false" placeholder="填写词语" onpaste="return false" ondrop="return false">
          ${hint}
        </div>
      </div>`;
  });
  gridHtml += '</div>';

  let actionsHtml = '';
  if (S.cNeedsCorrect) {
    actionsHtml = `<div class="bc-actions"><button class="btn btn-primary" id="btn-confirm-c">✓ 确认改正，进入 D 默写</button></div>`;
  } else {
    actionsHtml = `
      <div class="bc-actions">
        <button class="btn btn-primary" id="btn-submit-c">📤 提交答案</button>
        <span class="attempt-info">第 ${S.cAttempts + 1} 次</span>
      </div>`;
  }

  return `
    ${S.cPassed ? '' : buildTimerHtml(SECTION_TIMES.C)}
    <div class="c-instructions">📢 C 部分听写：根据华语意思和国语意思，写出正确的马来文词语。</div>
    ${resultHtml}${gridHtml}${actionsHtml}`;
}

// ═══════════════════════════════
//  SECTION D
// ═══════════════════════════════
function buildSectionD(n, tkData, pn, sd) {
  const done = !!(sd.completedTK||{})[n] && !pn.redoing;
  if (done) {
    const tkInfo = (sd.completedTK||{})[n] || {};
    const dScore = tkInfo.details?.D?.score || S.dResult?.score || 0;
    const bScore = tkInfo.details?.B?.score || 0;
    const cScore = tkInfo.details?.C?.score || 0;
    const attempts = pn.tkAttempts || 0; // number of redos done so far
    const canRedo = !isSuperTeacher() && attempts < 4; // max 4 redos (×90,×80,×70,×70)
    const nextRedoMult = canRedo ? SCORE_MULT[Math.min(attempts + 1, SCORE_MULT.length - 1)] : 0;
    const avg = tkInfo.bestAvg !== undefined ? tkInfo.bestAvg : getTKAvg(n, sd);
    const passed = avg >= 85;
    const isEvenTK = (n % 2 === 0);
    const nextN = n + 1;
    const hasNextTK = nextN <= 36;

    // Build pair unlock message
    let pairMsg = '';
    if (!isSuperTeacher()) {
      if (isEvenTK) {
        const bothPassed = getTKPassed(n - 1, sd) && getTKPassed(n, sd);
        if (bothPassed && hasNextTK) {
          const unlockDate = getPairUnlockDate(n, sd);
          const remaining = unlockDate ? unlockDate - new Date() : -1;
          if (remaining > 0) {
            pairMsg = `<div class="pair-unlock-box waiting">⏰ TK${nextN} + TK${nextN + 1} 将在 <b>${formatCountdown(remaining)}</b></div>`;
          } else {
            pairMsg = `<div class="pair-unlock-box unlocked">🎉 TK${nextN} + TK${nextN + 1} 已解锁！请前往继续练习！</div>`;
          }
        } else if (!passed) {
          pairMsg = `<div class="pair-unlock-box fail">⚠️ 本TK平均分 ${avg}%，未达85%。下一组暂未解锁，建议重做提高成绩。</div>`;
        }
      } else {
        // Odd TK
        if (passed && hasNextTK) {
          pairMsg = `<div class="pair-unlock-box unlocked">🎉 TK${nextN} 已解锁！完成 TK${nextN} 达标后，等待7天解锁下一组。</div>`;
        } else if (!passed) {
          pairMsg = `<div class="pair-unlock-box fail">⚠️ 本TK平均分 ${avg}%，未达85%。TK${nextN} 暂未解锁，建议重做提高成绩。</div>`;
        }
      }
    }

    const nextUnlocked = hasNextTK && isUnlocked(nextN);
    return `
      <div class="completion-card success-anim">
        <div class="completion-icon">🎉</div>
        <div class="completion-title">TK ${n} 完成！</div>
        <div class="completion-score">${dScore}<span class="completion-unit">分</span></div>
        <div class="completion-msg" style="margin-bottom:6px;">默写练习通过，恭喜完成本单元！</div>
        <div class="score-breakdown">
          <span>B 填空: <b>${bScore}分</b></span>
          <span>C 听写: <b>${cScore}分</b></span>
          <span>D 默写: <b>${dScore}分</b></span>
          <span style="border-top:1px solid #e5e7eb;padding-top:6px;width:100%;text-align:center;">平均分: <b style="color:${passed?'var(--green)':'var(--red)'}">${avg}%</b> ${passed?'✅ 达标':'❌ 未达标'}</span>
        </div>
        ${pairMsg}
        <div style="display:flex;gap:10px;justify-content:center;margin-top:18px;flex-wrap:wrap;">
          ${nextUnlocked ? `<button class="btn btn-primary" id="btn-next-tk" data-next="${nextN}">前往 TK ${nextN} →</button>` : ''}
          ${canRedo ? `<button class="btn btn-gold" data-redo-tk="${n}">🔄 重做 TK${n}（第${attempts+1}次重做·×${nextRedoMult}%）</button>` : (!isSuperTeacher() && attempts >= 4 ? '<span style="font-size:0.82rem;color:var(--gray);font-weight:700;">已达最大重做次数（4次）</span>' : '')}
          <button class="btn btn-gray" data-nav="main">返回主页</button>
        </div>
      </div>`;
  }
  const paras = getDParas(n);
  const paraText = getDParaText(n);
  const paraNum = paras.indexOf(paraText) + 1;
  const r = tkData.rencana;
  let resultHtml = '';
  if (S.dResult) {
    const { score, refW, matchedSet } = S.dResult;
    const passed = score >= PASS_THRESHOLD.D;
    const refHighlight = refW.map((w, i) =>
      `<span class="${matchedSet.has(i)?'matched':'missed'}">${escHtml(w)}</span>`
    ).join(' ');
    resultHtml = `
      <div class="lcs-result ${passed?'pass':'fail'} success-anim">
        <div style="display:flex;align-items:center;gap:12px;">
          <div class="score-num ${passed?'pass':'fail'}" style="font-size:2rem;">${score}分</div>
          <div class="score-msg">${passed?'✅ 通过！TK 完成！':'❌ 未达到80分，再试一次！'}</div>
        </div>
        <div class="lcs-words" style="margin-top:12px;">
          <div style="font-size:0.78rem;font-weight:700;color:var(--text-light);margin-bottom:6px;">参考答案匹配度（绿=匹配，红=未命中）：</div>
          ${refHighlight}
        </div>
      </div>`;
    if (passed) return resultHtml;
  }
  return `
    <div class="hint-box">
      <div class="hint-title">📖 华语提示 (Chinese Hints)</div>
      <div class="hint-text">${escHtml(r.cn)}</div>
    </div>
    <div class="d-label">✍️ 默写第 ${paraNum} / ${paras.length} 段：</div>
    <div class="d-instructions">根据上方华语提示，写出这一段完整的马来文。<br>系统使用智能词汇匹配（LCS算法），达到80分即可通过。</div>
    ${resultHtml}
    <textarea class="dictation-area" id="dictation-input" placeholder="在此输入马来文段落..." rows="5" onpaste="return false" ondrop="return false"></textarea>
    <div style="margin-top:6px;font-size:0.78rem;color:#d97706;font-weight:600;">⚠️ 此处禁止复制粘贴，请自己打字默写。</div>
    <div style="margin-top:14px;display:flex;gap:10px;align-items:center;">
      <button class="btn btn-primary" id="btn-submit-d">📤 提交默写</button>
      <span style="font-size:0.82rem;color:var(--text-light);">可多次尝试，直到通过为止</span>
    </div>`;
}

// ═══════════════════════════════
//  PASSAGE INPUTS BUILDER
// ═══════════════════════════════
function buildPassageInputs(paras, results, answers) {
  let html = '<div class="passage-wrap">';
  paras.forEach((para, pi) => {
    const isTitle = pi === 0 && para.length === 1 && para[0].type === 'text';
    html += `<div class="${isTitle?'passage-title':'passage-para'}">`;
    para.forEach(tok => {
      if (tok.type === 'text') {
        html += escHtml(tok.content);
      } else {
        const idx = tok.index;
        let cls = 'blank-input';
        let val = '';
        let readonly = '';
        if (results) {
          const r = results[idx];
          if (r) {
            val = r.correct ? r.input : (r.needCorrect ? '' : r.input);
            cls += r.correct ? ' correct' : (r.needCorrect ? ' corrected' : ' wrong');
            readonly = r.correct ? 'readonly' : '';
          }
        }
        html += `<span class="blank-num">(${idx+1})</span><input class="${cls}" data-idx="${idx}" value="${escAttr(val)}" ${readonly} autocomplete="off" spellcheck="false">`;
      }
    });
    html += '</div>';
  });
  html += '</div>';
  return html;
}

function buildTimerHtml(totalSeconds) {
  return `
    <div class="timer-wrap">
      <div>
        <div class="timer-label">⏱ 剩余时间</div>
        <div class="timer-display">${formatTime(S.timerLeft || totalSeconds)}</div>
        <div class="timer-bar-wrap"><div class="timer-bar-fill" style="width:100%"></div></div>
      </div>
    </div>`;
}

// ═══════════════════════════════
//  REDO TK
// ═══════════════════════════════
function redoTK(n) {
  const pn = getP(n);
  const attempts = pn.tkAttempts || 0;
  if (attempts >= 4) { alert('此TK已达到最大重做次数（4次）！'); return; }
  const mult = SCORE_MULT[Math.min(attempts + 1, SCORE_MULT.length - 1)];
  customConfirm(
    `确定要重做 TK ${n}？\n将重新完成 A→B→C→D 全部练习。\n本次分数将乘以 ×${mult}%（第${attempts + 1}次重做）。`,
    () => {
      setP(n, {
        aComplete: false, bComplete: false, cComplete: false,
        dComplete: false, complete: false, redoing: true,
        bScore: 0, cScore: 0, dParaQueue: []
      });
      openTK(n);
    }, '🔄'
  );
}

// ═══════════════════════════════
//  STATUS CARD (main screen)
// ═══════════════════════════════
function buildStatusCard(sd) {
  // Find all pairs currently in 7-day wait
  const waitList = [];
  for (let n = 3; n <= 36; n += 2) {
    const ms = getPairWaitMs(n, sd);
    if (ms !== null) waitList.push({ n, ms });
  }
  // Find completed TKs that can still be redone
  const redoable = [];
  Object.keys(sd.completedTK || {}).forEach(k => {
    const num = +k;
    const pn = (sd.progress || {})[num] || {};
    const attempts = pn.tkAttempts || 0;
    if (attempts < 4) redoable.push({ n: num, remaining: 4 - attempts });
  });
  redoable.sort((a, b) => a.n - b.n);
  if (!waitList.length && !redoable.length) return '';
  let html = '<div class="status-card">';
  if (waitList.length) {
    waitList.forEach(({ n, ms }) => {
      html += `
        <div class="status-row">
          <span class="status-icon">⏰</span>
          <div>
            <div class="status-title">TK${n} + TK${n + 1} 解锁倒计时</div>
            <div class="status-val">${formatCountdown(ms)}</div>
          </div>
        </div>`;
    });
  }
  if (waitList.length && redoable.length) {
    html += '<div class="status-divider"></div>';
  }
  if (redoable.length) {
    html += `
      <div class="status-row">
        <span class="status-icon">🔄</span>
        <div>
          <div class="status-title">等待期间可重做巩固（取最高分）</div>
          <div class="status-chips">
            ${redoable.map(({ n, remaining }) => `<span class="status-chip">TK${n} · 剩余${remaining}次</span>`).join('')}
          </div>
        </div>
      </div>`;
  }
  html += '</div>';
  return html;
}

function buildStudentRows() {
  const all = getAllStudents();
  const names = Object.keys(all);
  _deleteNameList = names; // keep in sync for deleteStudentByIndex
  if (!names.length) return `<tr><td colspan="6" style="text-align:center;color:var(--text-light);padding:20px;">尚未添加任何学生</td></tr>`;
  return names.map((name, idx) => {
    const sd = all[name];
    const completed = Object.keys(sd.completedTK || {}).length;
    const unlocked = isUnlockedForStudent(sd);
    return `
      <tr>
        <td><b>${escHtml(name)}</b></td>
        <td>${completed} / 36</td>
        <td>${sd.totalScore || 0} 分</td>
        <td>${completed===36?'<span style="color:var(--green);font-weight:700;">✅ 全部完成</span>':completed>0?`<span style="color:var(--gold);">📖 进行中 (TK${unlocked})</span>`:'<span style="color:var(--gray);">⏳ 未开始</span>'}</td>
        <td><button class="btn btn-sm btn-gray" onclick="resetStudentByIndex(${idx})">重置</button></td>
        <td><button class="btn btn-sm btn-red"  onclick="deleteStudentByIndex(${idx})">🗑️ 删除</button></td>
      </tr>`;
  }).join('');
}

function isUnlockedForStudent(sd) {
  const completed = Object.keys(sd.completedTK || {}).map(Number);
  return completed.length > 0 ? Math.max(...completed) + 1 : 1;
}

function renderStudentLb() {
  const content = document.getElementById('student-lb-content');

  const merged = Object.assign({}, _lbCache);
  const localAll = getAllStudents();

    const fireKey = encodeFireKey(k);
    merged[fireKey] = localAll[k]; // local overwrites (has latest data)
  });

    .map(([, sd]) => sd)
    .filter(sd => sd && sd.totalScore !== undefined);

    .filter(([, sd]) => sd && sd.totalScore !== undefined)
    .map(([key, sd]) => ({ name: nameMap[key] || key, sd }))
    .sort((a, b) => b.sd.totalScore !== a.sd.totalScore
      ? b.sd.totalScore - a.sd.totalScore

function enterSection(sec, tkNum) {
  stopTimer();
  S.currentSection = sec;
  if (sec === 'A' && !getP(tkNum).aComplete) {
    renderApp();
    startTimer(SECTION_TIMES.A, updateTimerUI, () => completeA(tkNum));
  } else if (sec === 'B' && !getP(tkNum).bComplete && !S.bPassed) {
    S.bResults = null; S.bAttempts = 0; S.bPassed = false; S.bNeedsCorrect = false;
    renderApp();
    startTimer(SECTION_TIMES.B, updateTimerUI, () => autoSubmitB(tkNum));
  } else if (sec === 'C' && !getP(tkNum).cComplete && !S.cPassed) {
    S.cResults = null; S.cAttempts = 0; S.cPassed = false; S.cNeedsCorrect = false; S.cShuffledVocab = null;
    renderApp();
    startTimer(SECTION_TIMES.C, updateTimerUI, () => autoSubmitC(tkNum));
  } else {
    S.dResult = null;
    initDPara(tkNum);
    renderApp();
  }
}

function completeA(n) {
  stopTimer();
  if (!isSuperTeacher()) setP(n, { aComplete: true });
  S.currentSection = 'B';
  S.bResults = null; S.bAttempts = 0; S.bPassed = false; S.bNeedsCorrect = false;
  renderApp();
  if (!isSuperTeacher()) startTimer(SECTION_TIMES.B, updateTimerUI, () => autoSubmitB(n));
}

// ═══════════════════════════════
//  SECTION B ACTIONS
// ═══════════════════════════════
function submitB(n) {
  const inputs = document.querySelectorAll('.blank-input[data-idx]');
  const answers = TK[n].fillBlanks.answers;
  const inputVals = {};
  inputs.forEach(inp => { inputVals[+inp.dataset.idx] = inp.value.trim(); });
  S.bAttempts++;
  let correct = 0;
  const results = answers.map((ans, i) => {
    const v = (inputVals[i]||'').toLowerCase().trim();
    const a = ans.toLowerCase().trim();
    const isCorrect = v === a;
    if (isCorrect) correct++;
    return { input: inputVals[i]||'', answer: ans, correct: isCorrect };
  });
  S.bResults = results;
  S.bScore = Math.round(correct / answers.length * 100);
  const passed = S.bScore >= PASS_THRESHOLD.B;
  if (passed || S.bAttempts >= B_MAX_ATTEMPTS) {
    stopTimer();
    S.bPassed = true;
    results.forEach(r => { if (!r.correct) r.needCorrect = true; });
    S.bNeedsCorrect = results.some(r => !r.correct);
    if (!S.bNeedsCorrect) { finishB(n); return; }
  }
  renderApp();
  if (!S.bPassed) startTimer(S.timerLeft || SECTION_TIMES.B, updateTimerUI, () => autoSubmitB(n));
}
function autoSubmitB(n) { submitB(n); }

function confirmCorrectionsB(n) {
  const inputs = document.querySelectorAll('.blank-input[data-idx]');
  const answers = TK[n].fillBlanks.answers;
  let allOk = true;
  inputs.forEach(inp => {
    const idx = +inp.dataset.idx;
    if (S.bResults[idx] && !S.bResults[idx].correct) {
      if (inp.value.trim().toLowerCase() !== answers[idx].toLowerCase()) { allOk = false; inp.classList.add('wrong'); }
    }
  });
  if (!allOk) { alert('请确保所有红色标记的答案已改正！'); return; }
  finishB(n);
}
function finishB(n) {
  stopTimer();
  if (!isSuperTeacher()) setP(n, { bComplete: true, bScore: S.bScore });
  S.bNeedsCorrect = false;
  S.currentSection = 'B';  // stay on B to show completion score
  renderApp();
}

// ═══════════════════════════════
//  SECTION D ACTIONS
// ═══════════════════════════════
function submitD(n) {
  const textarea = document.getElementById('dictation-input');
  if (!textarea || !textarea.value.trim()) { alert('请先输入马来文段落！'); return; }
  const reference = getDParaText(n);
  S.dResult = scoreDictation(textarea.value, reference);
  if (isSuperTeacher()) { renderApp(); return; } // PEGGY: no scoring/saving
  if (S.dResult.score >= PASS_THRESHOLD.D) {
    // Pop current paragraph from queue, save remaining
    let queue = S.dParaQueue.slice(1);
    if (!queue.length) {
      const paras = getDParas(n);
      queue = shuffle(paras.map((_, i) => i));
    }
    setP(n, { dParaQueue: queue });
    const sd = getStudentData(currentStudent) || newStudentObj();
    if (!sd.completedTK) sd.completedTK = {};
    // Only apply score multiplier if this is a REDO (after already passed)
    // First time completion always gets ×100%
    const pn = getP(n);
    const isRedo = !!pn.redoing;
    const redoNum = isRedo ? (pn.tkAttempts || 0) : 0; // redo count starts at 0 = first redo = ×90%
    const mult = isRedo ? (SCORE_MULT[Math.min(redoNum, SCORE_MULT.length - 1)] / 100) : 1;
    // Apply multiplier to scores
    const newB = Math.round(S.bScore * mult);
    const newC = Math.round(S.cScore * mult);
    const newD = Math.round(S.dResult.score * mult);
    const newAvg = Math.round((newB + newC + newD) / 3);
    const newTotal = newB + newC + newD;
    const existing = sd.completedTK[n];
    const oldBestAvg = existing ? (existing.bestAvg !== undefined ? existing.bestAvg : getTKAvg(n, sd)) : 0;
    const isBetter = newAvg > oldBestAvg;
    // passedAt: set once when multiplied avg >= 85%, never removed
    const passedAt = (existing && existing.passedAt) || (newAvg >= 85 ? new Date().toISOString() : null);
    // Update completedTK — keep best scores
    const oldTotal = existing ? existing.score : 0;
    sd.completedTK[n] = {
      score: isBetter ? newTotal : (existing ? existing.score : newTotal),
      bestAvg: isBetter ? newAvg : oldBestAvg,
      time: 0,
      date: existing ? existing.date : new Date().toISOString(), // keep original date
      passedAt: passedAt,
      details: isBetter
        ? { B: { score: newB }, C: { score: newC }, D: { score: newD } }
        : (existing ? existing.details : { B: { score: newB }, C: { score: newC }, D: { score: newD } })
    };
    // Update totalScore: add difference if improved, or add fresh if first time
    if (!existing) {
      sd.totalScore = (sd.totalScore || 0) + newTotal;
    } else if (isBetter) {
      sd.totalScore = (sd.totalScore || 0) + (newTotal - oldTotal);
    }
    saveStudentData(currentStudent, sd);
    // Increment redo count only if this was a redo, clear redoing flag
    const newAttempts = isRedo ? (pn.tkAttempts || 0) + 1 : (pn.tkAttempts || 0);
    setP(n, { dComplete: true, complete: true, redoing: false, tkAttempts: newAttempts });
  }
  renderApp();
}

// ═══════════════════════════════
//  NAVIGATION
// ═══════════════════════════════
function navigate(screen) {
  stopTimer();
  S.screen = screen;
  renderApp();
}

function logout() {
  stopTimer();
  currentStudent = null;
  S.screen = 'login';
  renderApp();
}

function openTK(n) {
  if (!isUnlocked(n)) return;
  stopTimer();
  S.screen = 'tk';
  S.currentTk = n;
  S.bResults = null; S.bAttempts = 0; S.bPassed = false; S.bNeedsCorrect = false;
  S.cResults = null; S.cAttempts = 0; S.cPassed = false; S.cNeedsCorrect = false;
  S.dResult = null; S.dParaIdx = 0; S.dParaQueue = [];
  enterSection(getFirstUnlockedSection(n), n);
}

// ═══════════════════════════════
//  ATTACH EVENTS
// ═══════════════════════════════
function attachEvents() {
  // Login screen
  const btnStart = document.getElementById('btn-start-learning');
  if (btnStart) btnStart.addEventListener('click', startLearning);
  const nameInp = document.getElementById('student-name-input');
  if (nameInp) nameInp.addEventListener('keydown', e => { if (e.key === 'Enter') startLearning(); });
  const btnTeacher = document.getElementById('btn-show-teacher');
  if (btnTeacher) btnTeacher.addEventListener('click', () => {
    document.getElementById('teacher-pass-input').value = '';
    document.getElementById('teacher-pass-err').style.display = 'none';
    openModal('modal-teacher-login');
  });
  // Teacher pass modal enter key
  const tpi = document.getElementById('teacher-pass-input');
  if (tpi) tpi.addEventListener('keydown', e => { if (e.key === 'Enter') verifyTeacher(); });
  // New student modal enter key
  const nsi = document.getElementById('new-student-name');
  if (nsi) nsi.addEventListener('keydown', e => { if (e.key === 'Enter') addStudent(); });

  // Main screen
  const btnLogout = document.getElementById('btn-logout');
  if (btnLogout) btnLogout.addEventListener('click', logout);
  const btnStudentLb = document.getElementById('btn-student-lb');
  if (btnStudentLb) btnStudentLb.addEventListener('click', openStudentLeaderboard);
  // Start realtime leaderboard listener when on main screen
  if (S.screen === 'main' && !isSuperTeacher()) startLbListener();
  document.querySelectorAll('[data-open-tk]').forEach(el => {
    el.addEventListener('click', () => openTK(+el.dataset.openTk));
  });

  // TK nav
  document.querySelectorAll('[data-nav]').forEach(el => {
    el.addEventListener('click', () => navigate(el.dataset.nav));
  });
  document.querySelectorAll('[data-section]').forEach(el => {
    el.addEventListener('click', () => {
      const sec = el.dataset.section;
      if (isSectionUnlocked(S.currentTk, sec)) enterSection(sec, S.currentTk);
    });
  });
  document.querySelectorAll('[data-flip]').forEach(el => {
    el.addEventListener('click', () => {
      el.classList.toggle('flipped');
      // Check how many cards have been flipped at least once
      const total = document.querySelectorAll('[data-flip]').length;
      const flipped = document.querySelectorAll('[data-flip].flipped').length;
      const countEl = document.getElementById('flip-count');
      const reminderEl = document.getElementById('flip-reminder');
      const btn = document.getElementById('btn-complete-a');
      if (countEl) countEl.textContent = flipped + '/' + total;
      if (flipped >= total) {
        if (btn) { btn.disabled = false; btn.style.opacity = '1'; btn.style.cursor = 'pointer'; btn.textContent = '✓ 完成词汇学习，进入 B 部分'; }
        if (reminderEl) { reminderEl.style.color = 'var(--green)'; reminderEl.innerHTML = '✅ 全部卡片已翻转！可以继续了。'; }
      } else {
        if (btn) { btn.disabled = true; btn.style.opacity = '0.4'; btn.style.cursor = 'not-allowed'; btn.textContent = '🔒 请先翻转所有卡片'; }
      }
    });
  });

  // Section B proceed
  const btnProceedC = document.getElementById('btn-proceed-c');
  if (btnProceedC) btnProceedC.addEventListener('click', () => proceedToC(S.currentTk));
  // Section C proceed
  const btnProceedD = document.getElementById('btn-proceed-d');
  if (btnProceedD) btnProceedD.addEventListener('click', () => proceedToD(S.currentTk));
  // Next TK button
  const btnNextTk = document.getElementById('btn-next-tk');
  if (btnNextTk) btnNextTk.addEventListener('click', () => openTK(+btnNextTk.dataset.next));
  // Redo TK button
  document.querySelectorAll('[data-redo-tk]').forEach(btn => {
    btn.addEventListener('click', () => redoTK(+btn.dataset.redoTk));
  });

  // Section A
  const btnA = document.getElementById('btn-complete-a');
  if (btnA) btnA.addEventListener('click', () => completeA(S.currentTk));
  // Section B
  const btnB = document.getElementById('btn-submit-b');
  if (btnB) btnB.addEventListener('click', () => submitB(S.currentTk));
  const btnCfB = document.getElementById('btn-confirm-b');
  if (btnCfB) btnCfB.addEventListener('click', () => confirmCorrectionsB(S.currentTk));
  // Section C
  const btnC = document.getElementById('btn-submit-c');
  if (btnC) btnC.addEventListener('click', () => submitC(S.currentTk));
  const btnCfC = document.getElementById('btn-confirm-c');
  if (btnCfC) btnCfC.addEventListener('click', () => confirmCorrectionsC(S.currentTk));
  // Section D
  const btnD = document.getElementById('btn-submit-d');
  if (btnD) btnD.addEventListener('click', () => submitD(S.currentTk));

  // Word bank click to fill
  document.querySelectorAll('.wb-item[data-wb]').forEach(wb => {
    wb.addEventListener('click', () => {
      const focused = document.querySelector('.blank-input:focus');
      const emptyInputs = [...document.querySelectorAll('.blank-input:not([readonly])')].filter(i => !i.value.trim());
      const target = (focused && !focused.value.trim()) ? focused : (emptyInputs[0] || null);
      if (target) {
        target.value = wb.textContent.trim();
        wb.classList.add('used');
        const next = [...document.querySelectorAll('.blank-input:not([readonly])')].find(i => !i.value.trim());
        if (next) next.focus();
      }
    });
  });

  // Admin panel buttons
  const btnAdminLogout = document.getElementById('btn-admin-logout');
  if (btnAdminLogout) btnAdminLogout.addEventListener('click', () => { S.screen = 'login'; renderApp(); });
  const btnOpenAdd = document.getElementById('btn-open-add');
  if (btnOpenAdd) btnOpenAdd.addEventListener('click', () => {
    document.getElementById('new-student-name').value = '';
    document.getElementById('add-student-err').style.display = 'none';
    openModal('modal-add-student');
  });
  const btnOpenLb = document.getElementById('btn-open-lb');
  if (btnOpenLb) btnOpenLb.addEventListener('click', openLeaderboard);
  const btnOpenScores = document.getElementById('btn-open-scores');
  if (btnOpenScores) btnOpenScores.addEventListener('click', openStudentScores);
  const btnSimulate = document.getElementById('btn-simulate-test');
  if (btnSimulate) btnSimulate.addEventListener('click', simulateTest);
  const btnResetAll = document.getElementById('btn-reset-all');
  if (btnResetAll) btnResetAll.addEventListener('click', () => {
    customConfirm('确定要重置所有学生的全部进度吗？此操作不可撤销！', () => {
      localStorage.removeItem(STORAGE_KEY);
      renderApp();
    }, '⚠️');
  });

  // Close modals on overlay click
  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => {
      if (e.target === overlay) overlay.classList.remove('open');
    });
  });
}

// ═══════════════════════════════
//  PRELOAD STUDENTS (teacher pre-added)
// ═══════════════════════════════
function preloadStudents(nameList) {
  const all = getAllStudents();
  let added = 0;
  nameList.forEach(name => {
    const n = name.trim().toUpperCase();
    if (n && !all[n]) {
      all[n] = newStudentObj();
      added++;
    }
  });
  if (added > 0) {
    saveAllStudents(all);
    // Sync new students to Firebase
    nameList.forEach(name => {
      const n = name.trim().toUpperCase();
      if (n) {
        try {
          db.ref('students/' + encodeFireKey(n)).once('value').then(snap => {
            if (!snap.exists()) {
              db.ref('students/' + encodeFireKey(n)).set(all[n]).catch(() => {});
            }
          }).catch(() => {});
        } catch(e) {}
      }
    });
  }
}

// Sync ALL students from Firebase into localStorage on page load
// so student list is always up to date across devices
function syncAllStudentsFromFirebase(onDone) {
  try {
    db.ref('students').once('value').then(snap => {
      const remote = snap.val() || {};
      const local = getAllStudents();
      // Merge: Firebase is source of truth for student list
      // but keep local data if it's newer (lastAccess)
      Object.keys(remote).forEach(fireKey => {
        // Find matching local name
        const matchName = Object.keys(local).find(n => encodeFireKey(n) === fireKey);
        const remoteSd = remote[fireKey];
        if (matchName) {
          // Keep whichever is more recent
          const localTime = new Date(local[matchName].lastAccess || 0).getTime();
          const remoteTime = new Date(remoteSd.lastAccess || 0).getTime();
          if (remoteTime > localTime) local[matchName] = remoteSd;
        } else {
          // New student from Firebase not in local — add them
          // Try to find the display name from preloaded list
          local[fireKey] = remoteSd;
        }
      });
      saveAllStudents(local);
      onDone();
    }).catch(() => onDone());
  } catch(e) { onDone(); }
}
